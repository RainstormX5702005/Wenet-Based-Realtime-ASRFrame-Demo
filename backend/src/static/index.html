<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实时语音转写</title>
<style>
body { font-family: monospace; max-width: 800px; margin: 20px auto; padding: 0 20px; }
button { font-size: 18px; padding: 10px 24px; cursor: pointer; }
#status { margin: 12px 0; color: #666; }
#output { margin-top: 20px; }
.utterance { margin: 8px 0; padding: 8px; background: #f5f5f5; border-radius: 4px; }
.timestamp { color: #999; font-size: 12px; }
</style>
</head>
<body>
<h1>实时语音转写</h1>

<button id="startBtn">开始录音</button>
<button id="stopBtn" disabled>停止录音</button>
<div id="status">等待开始...</div>

<hr>

<div id="output"></div>

<script>
const SAMPLE_RATE = 16000;
const CHUNK_SIZE = 512;

const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const statusDiv = document.getElementById('status');
const outputDiv = document.getElementById('output');

let audioContext = null;
let processor = null;
let stream = null;
let ws = null;

function setStatus(text) {
    statusDiv.textContent = text;
}

function addUtterance(text) {
    const now = new Date().toLocaleTimeString();
    const div = document.createElement('div');
    div.className = 'utterance';
    div.innerHTML = `<span class="timestamp">${now}</span> ${text}`;
    outputDiv.prepend(div);
}

async function start() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new AudioContext({ sampleRate: SAMPLE_RATE });

        const source = audioContext.createMediaStreamSource(stream);

        processor = audioContext.createScriptProcessor(CHUNK_SIZE, 1, 1);

        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws`);
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => setStatus('已连接，正在录音...');

        ws.onmessage = (event) => {
            addUtterance(event.data);
        };

        ws.onerror = () => setStatus('WebSocket 连接错误');
        ws.onclose = () => setStatus('连接已断开');

        processor.onaudioprocess = (event) => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const input = event.inputBuffer.getChannelData(0);
                ws.send(input.buffer);
            }
        };

        source.connect(processor);
        processor.connect(audioContext.destination);

        startBtn.disabled = true;
        stopBtn.disabled = false;
    } catch (err) {
        setStatus('错误: ' + err.message);
        console.error(err);
    }
}

function stop() {
    if (processor) {
        processor.disconnect();
        processor = null;
    }
    if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
    }
    if (audioContext) {
        audioContext.close();
        audioContext = null;
    }
    if (ws) {
        ws.close();
        ws = null;
    }
    startBtn.disabled = false;
    stopBtn.disabled = true;
    setStatus('已停止');
}

startBtn.addEventListener('click', start);
stopBtn.addEventListener('click', stop);
</script>
</body>
</html>
